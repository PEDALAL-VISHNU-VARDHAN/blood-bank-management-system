<!DOCTYPE html>
<html>
<head>
    <title>Blood Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: url("/static/images/blood_bg.png") no-repeat center center fixed;
        background-size: cover;
        font-family: 'Segoe UI', sans-serif;
    }

    /* overlay */
    .overlay {
        background: rgba(255, 255, 255, 0.6);
        min-height: 100vh;
        padding: 20px;
    }

    .navbar {
        background: linear-gradient(90deg, #dc3545, #b02a37);
    }

    .card {
        border-radius: 15px;
        background: rgba(255,255,255,0.85);
        box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    }
    </style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">Blood Bank System</span>

    <div>
        <a href="/dashboard" class="btn btn-light btn-sm">Home</a>
        <a href="/logout" class="btn btn-dark btn-sm">Logout</a>
    </div>
</nav>

<div class="overlay">
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
