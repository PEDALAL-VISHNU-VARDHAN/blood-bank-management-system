<!DOCTYPE html>
<html>

<head>
<title>Regular Request</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

/* 🌍 BACKGROUND IMAGE */
body {
    background: url("/static/images/blood_bg.png") no-repeat center center fixed;
    background-size: cover;
}

/* 🌫 OVERLAY */
.page-overlay {
    background: rgba(255,255,255,0.6);
    min-height: 100vh;
    padding-bottom: 30px;
}

</style>

</head>

<body>

<!-- 🌫 WRAPPER START -->
<div class="page-overlay">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-danger px-3">
<span class="navbar-brand">Regular Request</span>

<div>
<a href="/request" class="btn btn-light btn-sm me-2">Back</a>
<a href="/logout" class="btn btn-dark btn-sm">Logout</a>
</div>
</nav>

<div class="container mt-5">

<div class="card p-4 shadow border-primary">

<h3 class="text-primary text-center mb-3">Regular Request</h3>

<form method="POST" action="/submit_request">

<input type="hidden" name="type" value="Regular">

<input type="text" name="name" class="form-control mb-2" placeholder="Patient Name" required>
<input type="text" name="phone" class="form-control mb-2" placeholder="Phone Number" required>

<select name="blood_group" class="form-control mb-2" required>
<option disabled selected>Select Blood Group</option>
<option>A+</option>
<option>B+</option>
<option>O+</option>
<option>AB+</option>
<option>A-</option>
<option>B-</option>
<option>O-</option>
<option>AB-</option>
</select>

<input type="number" name="units" class="form-control mb-2" placeholder="Units Required" required>
<input type="text" name="location" class="form-control mb-3" placeholder="Hospital / Location" required>

<button class="btn btn-primary w-100">Submit Request</button>

</form>

</div>

</div>

</div>
<!-- 🌫 WRAPPER END -->

</body>
</html>
