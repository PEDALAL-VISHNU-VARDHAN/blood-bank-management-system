<!DOCTYPE html>
<html>

<head>
<title>Health Verification</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

/* 🌍 BACKGROUND IMAGE */
body{
    background:url("/static/images/blood_bg.png") no-repeat center center fixed;
    background-size:cover;
    font-family:Arial,sans-serif;
    color:#0A2540;
}

/* 🌫 OVERLAY */
.page-overlay{
    background:rgba(248,250,252,0.90);
    min-height:100vh;
    padding-bottom:40px;
}

/* 🎯 PAGE TITLE */
h1{
    color:#0F172A;
    font-weight:700;
    font-size:48px;
}

/* 📦 TABLE CONTAINER */
.table{
    background:#FFFFFF;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 6px 25px rgba(15,23,42,0.08);
}

/* 🔥 TABLE HEAD */
.table th{
    background:#0F172A;
    color:#F8FAFC;
    border:none;
    padding:16px;
    font-size:16px;
}

/* 📄 TABLE BODY */
.table td{
    vertical-align:middle;
    padding:16px;
    border-color:#D6D3D1;
    color:#475569;
    background:#FFFFFF;
}

/* 🏷 BADGES */
.badge{
    padding:8px 14px;
    border-radius:10px;
    font-size:14px;
}

/* 🔘 BUTTONS */
.btn{
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
}

/* 🔵 PRIMARY */
.btn-primary{
    background:#2563EB;
    border:none;
}

.btn-primary:hover{
    background:#1D4ED8;
    transform:translateY(-2px);
}

/* 🟢 SUCCESS */
.btn-success{
    background:#15803D;
    border:none;
}

.btn-success:hover{
    background:#166534;
    transform:translateY(-2px);
}

/* 🔴 DANGER */
.btn-danger{
    background:#DC2626;
    border:none;
}

.btn-danger:hover{
    background:#B91C1C;
    transform:translateY(-2px);
}

/* ⚪ MUTED TEXT */
.text-muted{
    color:#94A3B8 !important;
}

/* 📱 RESPONSIVE */
@media(max-width:768px){

    h1{
        font-size:32px;
    }

    .table{
        font-size:14px;
    }

}

</style>

</head>

<body>

<!-- 🌫 OVERLAY START -->
<div class="page-overlay">

<div class="container mt-4">

<h1 class="mb-4">
Health Verification
</h1>
<div class="d-flex justify-content-end mb-3">

<a href="/admin_home"
class="btn btn-secondary">

← Back

</a>

</div>
<table class="table table-bordered">

<tr>
<th>Name</th>
<th>Phone</th>
<th>Status</th>
<th>Report</th>
<th>Action</th>
</tr>

{% for d in donors %}

<tr>

<!-- NAME -->
<td>{{ d[0] }}</td>

<!-- PHONE -->
<td>{{ d[1] }}</td>

<!-- STATUS -->
<td>

{% if d[2] == "Fit" %}

<span class="badge bg-success">
Fit
</span>

{% elif d[2] == "Unfit" %}

<span class="badge bg-danger">
Unfit
</span>

{% else %}

<span class="badge bg-secondary">
Pending
</span>

{% endif %}

</td>

<!-- REPORT -->
<td>

{% if d[3] %}

<a href="/static/uploads/{{ d[3] }}"
target="_blank"
class="btn btn-primary btn-sm">

View Report

</a>

{% else %}

<span class="text-muted">
No Report
</span>

{% endif %}

</td>

<!-- ACTION -->
<td>

<form method="POST"
action="/verify_health/{{ d[1] }}/Fit"
style="display:inline;">

<button class="btn btn-success btn-sm">
Fit
</button>

</form>

<form method="POST"
action="/verify_health/{{ d[1] }}/Unfit"
style="display:inline;">

<button class="btn btn-danger btn-sm">
Unfit
</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>
<!-- 🌫 OVERLAY END -->

</body>
</html>
