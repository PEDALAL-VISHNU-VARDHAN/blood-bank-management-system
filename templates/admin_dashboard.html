<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🌍 BACKGROUND IMAGE */
body{
    background:url("/static/images/blood_bg.png") no-repeat center center fixed;
    background-size:cover;
    color:#0A2540;
    font-family:Arial, sans-serif;
}

/* 🌫 OVERLAY */
.page-overlay{
    background:rgba(248,250,252,0.90);
    min-height:100vh;
    padding-bottom:40px;
}

/* 🔥 MAIN CONTAINER */
.container{
    padding-bottom:40px;
}

/* 🎯 PAGE TITLE */
h3{
    color:#0F172A;
    font-weight:700;
    font-size:48px;
}

/* 🔍 SEARCH BAR */
.form-control{
    border:1px solid #D6D3D1;
    border-radius:12px;
    padding:12px;
    background:#FFFFFF;
    color:#0A2540;
}

.form-control:focus{
    border-color:#2563EB;
    box-shadow:0 0 0 0.15rem rgba(37,99,235,0.25);
}

/* 📦 CARDS */
.card{
    background:#FFFFFF;
    border:none;
    border-radius:22px;
    box-shadow:0 6px 25px rgba(15,23,42,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 35px rgba(37,99,235,0.15);
}

/* 🏷 CARD TITLES */
.card h5{
    color:#0F172A;
    font-weight:700;
    font-size:28px;
}

/* 📋 TABLE */
.table{
    border-radius:16px;
    overflow:hidden;
}

.table th{
    background:#0F172A;
    color:#F8FAFC;
    border:none;
    padding:14px;
}

.table td{
    vertical-align:middle;
    border-color:#D6D3D1;
    color:#475569;
    padding:14px;
    background:#FFFFFF;
}

/* 🔘 BUTTONS */
.btn{
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
    padding:10px 18px;
}

/* PRIMARY */
.btn-primary{
    background:#2563EB;
    border:none;
}

.btn-primary:hover{
    background:#1D4ED8;
    transform:translateY(-2px);
}

/* SUCCESS */
.btn-success{
    background:#15803D;
    border:none;
}

.btn-success:hover{
    background:#166534;
    transform:translateY(-2px);
}

/* DANGER */
.btn-danger{
    background:#DC2626;
    border:none;
}

.btn-danger:hover{
    background:#B91C1C;
    transform:translateY(-2px);
}

/* DARK BUTTON */
.btn-dark{
    background:#0F172A;
    border:none;
}

.btn-dark:hover{
    background:#1E293B;
    transform:translateY(-2px);
}

/* 🔴 BLOOD BADGE */
.badge{
    padding:8px 12px;
    border-radius:10px;
    font-size:14px;
}

/* INPUT LABEL STYLE */
label{
    color:#475569;
    font-weight:500;
}

/* 🔥 SETTINGS SECTION */
.card form input{
    margin-bottom:12px;
}

/* 📱 RESPONSIVE */
@media(max-width:768px){

    .table{
        font-size:14px;
    }

    h3{
        font-size:32px;
    }

}

</style>

</head>

<body>

<!-- 🌫 OVERLAY START -->
<div class="page-overlay">

<div class="container mt-4">

<h3 class="text-center mb-4">
Admin Dashboard
</h3>
<div class="d-flex justify-content-end mb-3">

<a href="/admin_home"
class="btn btn-secondary">

← Back

</a>

</div>
<!-- SEARCH -->
<form method="GET" action="/admin_dashboard" class="mb-3">

<input 
type="text" 
name="search" 
value="{{search}}" 
placeholder="Search donor by name..."
class="form-control">

</form>

<!-- ✅ ADMIN ACTION BUTTONS -->
<div class="mb-3">

<a href="/admin_feedback"
class="btn btn-dark me-2">

View Feedback

</a>

<a href="/health_dashboard"
class="btn btn-success">

Health Verification

</a>

</div>

<!-- SETTINGS -->
<div class="card p-4 mb-4">

<h5 class="mb-3">
System Settings
</h5>

<form method="POST" action="/update_settings">

<input 
type="number" 
name="coins" 
value="{{settings[0]}}" 
class="form-control mb-2"
placeholder="Coins Per Donation">

<input 
type="number" 
name="interval" 
value="{{settings[1]}}" 
class="form-control mb-3"
placeholder="Donation Interval">

<button class="btn btn-primary">
Update
</button>

</form>

</div>

<!-- DONORS -->
<div class="card p-4 mb-4">

<h5 class="mb-3">
Donors
</h5>

<table class="table table-hover">

<tr>
<th>Name</th>
<th>Blood</th>
<th>Coins</th>
<th>Last Donation</th>
<th>Action</th>
</tr>

{% for d in donors %}

<tr>

<td>{{d[0]}}</td>

<td>
<span class="badge bg-danger">
{{d[1]}}
</span>
</td>

<td>{{d[2]}}</td>

<td>{{d[3]}}</td>

<td>

<form method="POST" action="/admin_verify/{{d[1]}}">

<button class="btn btn-success btn-sm">
Verify
</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</div>

<!-- HEALTH -->
<div class="card p-4">

<h5 class="mb-3">
Add Health Report
</h5>

<form method="POST" action="/add_health">

<input 
type="text" 
name="donor" 
placeholder="Donor Name" 
class="form-control mb-2">

<input 
type="number" 
name="hb" 
placeholder="Hemoglobin" 
class="form-control mb-3">

<button class="btn btn-danger">
Add
</button>

</form>

</div>

</div>

</div>
<!-- 🌫 OVERLAY END -->

</body>
</html>
