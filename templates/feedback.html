<!DOCTYPE html>
<html>

<head>
<title>Feedback</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

/* 🌍 BACKGROUND IMAGE */
body {
    background: url("/static/images/blood_bg.png") no-repeat center center fixed;
    background-size: cover;
}

/* 🌫 OVERLAY */
.page-overlay {
    background: rgba(255,255,255,0.6);
    min-height: 100vh;
    padding-bottom: 30px;
}

</style>

</head>

<body>

<!-- 🌫 WRAPPER START -->
<div class="page-overlay">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-danger px-3">
<span class="navbar-brand">Blood Bank</span>

<div>
<a href="/dashboard" class="btn btn-light btn-sm me-2">Back</a>
<a href="/logout" class="btn btn-dark btn-sm">Logout</a>
</div>
</nav>

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="text-center mb-3">Submit Feedback</h3>

<form method="POST" action="/submit_feedback" enctype="multipart/form-data">

<textarea name="message" class="form-control mb-3" placeholder="Describe your issue..." required></textarea>

<input type="file" name="image" class="form-control mb-3">

<div class="col-md-4">
<div class="card p-3 shadow text-center">
<h5>Feedback</h5>
<a href="/feedback" class="btn btn-danger mt-2">Open</a>
</div>
</div>

<button class="btn btn-danger w-100">Submit</button>

</form>

</div>

</div>

</div>
<!-- 🌫 WRAPPER END -->

</body>
</html>
