<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🌍 BODY */
body{
background:url("/static/images/blood_bg.png") no-repeat center center fixed;
background-size:cover;
font-family:Arial,sans-serif;
}

/* 🌫 OVERLAY EFFECT */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(248,250,252,0.88);
z-index:-1;
}

/* 📦 LOGIN CARD */
.card{
border:none;
border-radius:22px;
background:#FFFFFF;
box-shadow:0 8px 30px rgba(15,23,42,0.10);
padding:35px;
}

/* 🎯 TITLE */
h3{
color:#0A2540;
font-size:36px;
font-weight:700;
margin-bottom:25px;
}

/* 🔤 INPUTS */
.form-control{
border:1px solid #D6D3D1;
border-radius:12px;
padding:12px;
background:#FFFFFF;
color:#0F172A;
}

/* ✨ INPUT FOCUS */
.form-control:focus{
border-color:#2563EB;
box-shadow:0 0 0 0.15rem rgba(37,99,235,0.25);
}

/* 🔘 LOGIN BUTTON */
.btn-danger{
background:#2563EB !important;
border:none;
border-radius:12px;
padding:12px;
font-size:18px;
font-weight:600;
transition:0.3s;
}

/* ✨ BUTTON HOVER */
.btn-danger:hover{
background:#1D4ED8 !important;
transform:translateY(-2px);
}

/* 📱 MOBILE */
@media(max-width:768px){

.card{
margin-top:40px;
}

h3{
font-size:30px;
}

}

</style>

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="text-center">
Admin Login
</h3>

<form method="POST">

<input 
type="text" 
name="username" 
class="form-control mb-2" 
placeholder="Username">

<input 
type="password" 
name="password" 
class="form-control mb-3" 
placeholder="Password">

<button class="btn btn-danger w-100">
Login
</button>

</form>

</div>

</div>

</body>
</html>
