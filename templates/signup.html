<!DOCTYPE html>
<html>

<head>
<title>Donor Registration</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

/* 🌍 UNIFIED BACKGROUND IMAGE */
body{
background:url("/static/images/blood_bg.png") no-repeat center center fixed;
background-size:cover;
height:100vh;
}

/* 🌫 OVERLAY */
.overlay{
background:rgba(255,255,255,0.6);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */
.card{
border-radius:15px;
padding:20px;
width:500px;
}

</style>

</head>

<body>

<div class="overlay">

<div class="card shadow">

<h3 class="text-center mb-3">
Donor Registration
</h3>

<!-- FLASH MESSAGES -->
{% with messages = get_flashed_messages() %}

{% if messages %}

{% for msg in messages %}

<div class="alert alert-danger">

{{ msg }}

</div>

{% endfor %}

{% endif %}

{% endwith %}

<form method="POST"
action="/register"
enctype="multipart/form-data">

<!-- NAME -->
<input 
type="text"
name="name"
class="form-control mb-2"
placeholder="Full Name"
required>

<!-- ADDRESS -->
<input 
type="text"
name="address"
class="form-control mb-2"
placeholder="Address"
required>

<!-- PHONE -->
<input 
type="text"
name="phone"
class="form-control mb-2"
placeholder="Phone Number"
required>

<!-- EMAIL -->
<input 
type="email"
name="email"
class="form-control mb-2"
placeholder="Email"
required>

<!-- BLOOD GROUP -->
<select 
name="blood_group"
class="form-control mb-2"
required>

<option value="" disabled selected>
Select Blood Group
</option>

<option value="A+">A+</option>
<option value="A-">A-</option>
<option value="B+">B+</option>
<option value="B-">B-</option>
<option value="O+">O+</option>
<option value="O-">O-</option>
<option value="AB+">AB+</option>
<option value="AB-">AB-</option>

</select>

<!-- AGE -->
<input 
type="number"
name="age"
class="form-control mb-2"
placeholder="Age"
required>

<!-- GENDER -->
<select 
name="gender"
class="form-control mb-2"
required>

<option disabled selected>
Select Gender
</option>

<option value="Male">
Male
</option>

<option value="Female">
Female
</option>

<option value="Other">
Other
</option>

</select>

<!-- WEIGHT -->
<input 
type="number"
name="weight"
class="form-control mb-2"
placeholder="Weight (kg)"
required>

<!-- REPORT DATE -->
<label class="mt-2">
Blood Report Date
</label>

<input 
type="date"
name="report_date"
class="form-control mb-2"
required>

<!-- REPORT -->
<label class="mt-2">
Upload Blood Group Report
</label>

<input 
type="file"
name="report"
class="form-control mb-3"
required>

<!-- PASSWORD -->
<input 
type="password"
name="password"
class="form-control mb-2"
placeholder="Create Password"
required>

<!-- CONFIRM PASSWORD -->
<input 
type="password"
name="confirm_password"
class="form-control mb-3"
placeholder="Re-enter Password"
required>

<!-- SUBMIT -->
<button class="btn btn-danger w-100">

Register

</button>

</form>

</div>

</div>

</body>
</html>
