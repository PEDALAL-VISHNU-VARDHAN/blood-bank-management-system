<!DOCTYPE html>
<html>

<head>
<title>Donor Registration</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

/* 🌍 UNIFIED BACKGROUND IMAGE */
body{
background:url("/static/images/blood_bg.png") no-repeat center center fixed;
background-size:cover;
height:100vh;
}

/* 🌫 OVERLAY */
.overlay{
background:rgba(255,255,255,0.6); /* lighter for clarity */
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */
.card{
border-radius:15px;
padding:20px;
width:500px;
}

</style>

</head>

<body>

<div class="overlay">

<div class="card shadow">

<h3 class="text-center mb-3">Donor Registration</h3>

<form method="POST" action="/register" enctype="multipart/form-data">

<input type="text" name="name" class="form-control mb-2" placeholder="Full Name" required>

<input type="text" name="address" class="form-control mb-2" placeholder="Address" required>

<input type="text" name="phone" class="form-control mb-2" placeholder="Phone Number" required>

<input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

<select name="blood_group" class="form-control mb-2" required>
<option value="" disabled selected>Select Blood Group</option>
<option value="A+">A+</option>
<option value="A-">A-</option>
<option value="B+">B+</option>
<option value="B-">B-</option>
<option value="O+">O+</option>
<option value="O-">O-</option>
<option value="AB+">AB+</option>
<option value="AB-">AB-</option>
</select>

<input type="number" name="age" class="form-control mb-2" placeholder="Age" required>

<select name="gender" class="form-control mb-2" required>
<option disabled selected>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="number" name="weight" class="form-control mb-2" placeholder="Weight (kg)" required>

<label class="mt-2">Upload Blood Group Report</label>
<input type="file" name="report" class="form-control mb-3" required>

<input type="password" name="password" class="form-control mb-2" placeholder="Create Password" required>

<input type="password" name="confirm_password" class="form-control mb-3" placeholder="Re-enter Password" required>

<button class="btn btn-danger w-100">Register</button>

</form>

</div>

</div>

</body>
</html>
