<!DOCTYPE html>
<html>

<head>
<title>Request Type</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

/* 🌍 BACKGROUND IMAGE */
body {
    background: url("/static/images/blood_bg.png") no-repeat center center fixed;
    background-size: cover;
}

/* 🌫 OVERLAY */
.page-overlay {
    background: rgba(255,255,255,0.6);
    min-height: 100vh;
    padding-bottom: 30px;
}

/* CARD EFFECT */
.card{
cursor:pointer;
transition:0.3s;
}
.card:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<!-- 🌫 WRAPPER START -->
<div class="page-overlay">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-danger px-3">
<span class="navbar-brand">Request Blood</span>

<div>
<a href="/dashboard" class="btn btn-light btn-sm me-2">Back</a>
<a href="/logout" class="btn btn-dark btn-sm">Logout</a>
</div>
</nav>

<div class="container mt-5 text-center">

<h3 class="mb-4">Choose Request Type</h3>

<div class="row">

<div class="col-md-6">
<div class="card p-4 shadow bg-danger text-white"
onclick="location.href='/emergency'">
<h4>Emergency</h4>
<p>Immediate need</p>
</div>
</div>

<div class="col-md-6">
<div class="card p-4 shadow bg-primary text-white"
onclick="location.href='/regular'">
<h4>Regular</h4>
<p>Planned request</p>
</div>
</div>

</div>

</div>

</div>
<!-- 🌫 WRAPPER END -->

</body>
</html>
